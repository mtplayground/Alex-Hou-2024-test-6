services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://postgres:postgres@postgres:5432/zeroclaw_messages?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/zeroclaw_messages?sslmode=disable
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: zeroclaw_messages
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zeroclaw_messages"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
